[project]
authors = ["Brad Larson <larson@sunsetlakesoftware.com>"]
channels = ["conda-forge", "https://conda.modular.com/max-nightly"]
description = "MAX-CV: Accelerated image processing via MAX and Mojo"
name = "max-cv"
platforms = ["osx-arm64", "linux-aarch64", "linux-64"]
version = "0.1.0"

[tasks]
package_ops = { cmd="mojo package operations/ -o operations.mojopkg", env={ MODULAR_ONLY_USE_NEW_EXTENSIBILITY_API="true" } }
filter-single-image = { cmd="magic run package_ops && python examples/filter_single_image.py", env={ MODULAR_ONLY_USE_NEW_EXTENSIBILITY_API="true" }}
bench = { cmd = "magic run package_ops && mojo ./benchmarks/bench.mojo" }

[feature.test.tasks]
test = { cmd="magic run package_ops && pytest", env={ MODULAR_ONLY_USE_NEW_EXTENSIBILITY_API="true" }}

[feature.test.dependencies]
pytest = ">=8.3.2, <9"

[feature.notebook.tasks]
notebook = { cmd="magic run package_ops && cp operations.mojopkg examples/ && jupyter notebook", env={ MODULAR_ONLY_USE_NEW_EXTENSIBILITY_API="true" }}

[feature.notebook.dependencies]
matplotlib = ">=3.9.0,<4"
notebook = ">=7.3.2,<8"

[feature.showcase.tasks]
showcase = { cmd="magic run package_ops && python examples/showcase.py $0", env={ MODULAR_ONLY_USE_NEW_EXTENSIBILITY_API="true" }}

[feature.showcase.dependencies]
click = ">=8.1.7"
matplotlib = ">=3.9.0,<4"

[dependencies]
max = ">=25.2.0.dev2025031105,<26"
pillow = ">=11.0.0,<12"

[environments]
default = { solve-group = "default" }
test = { features = ["test"], solve-group = "default" }
notebook = { features = ["notebook"], solve-group = "default" }
showcase = { features = ["showcase"], solve-group = "default" }
